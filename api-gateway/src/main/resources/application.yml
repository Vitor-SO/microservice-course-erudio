server:
  port: 8765
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        routes:
          - id: book-service
            uri: lb://book-service
            predicates:
              - Path=/book-service/**
          - id: exchange-service
            uri: lb://exchange-service
            predicates:
              - Path=/exchange-service/**
springdoc:
  swagger-ui:
    urls:
      - name: book-service
        url: /book-service/v3/api-docs
      - name: exchange-service
        url: /exchange-service/v3/api-docs

  management:
    tracing:
      sampling:
        probability: 1.0
  zipkin:
    base-url: ${SPRING_ZIPKIN_BASEURL:http://localhost:9411}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka