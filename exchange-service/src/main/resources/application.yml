server:
  port: 8000
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
spring:
  application:
    name: exchange-service
  datasource:
    url: jdbc:mysql://localhost:3306/exchange-service?useSSL=false&allowPublicKeyRetrieval=true
    username: mysql
    password: mysql
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: false
    open-in-view: false
springdoc:
  api-docs:
    path: /exchange-service/v3/api-docs
  swagger-ui:
    url: /exchange-service/v3/api-docs

  management:
    tracing:
      sampling:
        probability: 1.0
  zipkin:
    base-url:${SPRING_ZIPKIN_BASEURL:http://localhost:9411}
