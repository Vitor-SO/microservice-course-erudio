name: Microservice Continuous Deployment with Github Actions

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.MICROSERVICE_COURSE_DOCKER_HUB_ACCESS_TOKEN }}

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'adopt'

    - name: Build Eureka Naming Server Docker Image
      working-directory: ./naming-server
      run: mvn spring-boot:build-image -DskipTests

    - name: Build Api Gateway Docker Image
      working-directory: ./api-gateway
      run: mvn spring-boot:build-image -DskipTests

    - name: Build Exchange Microservice Docker Image
      working-directory: ./exchange-service
      run: mvn clean package -DskipTests

    - name: Build Book Microservice Docker Image
      working-directory: ./book-service
      run: mvn clean package -DskipTests

    - name: Docker Compose Build
      working-directory: .
      env:
        MYSQL_ROOT_PASSWORD: ${{ secrets.MICROSERVICE_COURSE_MYSQL_ROOT_PASSWORD }}
        MYSQL_USER: ${{ secrets.MICROSERVICE_COURSE_MYSQL_USER }}
        MYSQL_PASSWORD: ${{ secrets.MICROSERVICE_COURSE_MYSQL_PASSWORD }}
      run: |
        export TAG=snapshot-$(date +%Y%m%d)
        docker compose build

    - name: Push Docker Images to Docker Hub
      working-directory: .
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      run: |
        export TAG=snapshot-$(date +%Y%m%d)
        docker compose push