name: Microservice Continuous Deployment with Github Actions

on:
  push:
    branches: [ "main" ]]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.MICROSERVICE_COURSE_DOCKER_HUB_ACCESS_TOKEN }}
